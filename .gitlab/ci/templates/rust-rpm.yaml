.rust_rpm_template:
  variables:
    CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
    RUSTUP_HOME: "$CI_PROJECT_DIR/.rustup"

  cache:
    paths:
      - .cargo/registry/
      - .cargo/git/

  script:
    - cargo build --release
    - cargo rpm build

  artifacts:
    paths:
      - target/release/rpmbuild/RPMS/
    expire_in: 1 week
